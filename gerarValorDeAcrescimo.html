<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora de Acréscimo</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#4f46e5,#06b6d4);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0;
}

.card{
    background:white;
    padding:35px;
    border-radius:14px;
    width:360px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-top:0;
    color:#333;
}

label{
    font-size:14px;
    color:#444;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:18px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:16px;
}

input:focus{
    border-color:#4f46e5;
    outline:none;
}

.result{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#4f46e5;
    margin-top:15px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:10px;
}

button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.calc{
    background:#4f46e5;
    color:white;
}

.calc:hover{
    background:#4338ca;
}

.clear{
    background:#e5e7eb;
}

.clear:hover{
    background:#d1d5db;
}

.copy{
    margin-top:10px;
    width:100%;
    background:#06b6d4;
    color:white;
}

.copy:hover{
    background:#0891b2;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#777;
}

</style>
</head>

<body>

<div class="card">

<h1>Acréscimo de R$100</h1>

<label>Quantidade vendida</label>
<input type="number" id="quantidade" placeholder="Ex: 50">

<label>Valor unitário (R$)</label>
<input type="number" id="valor" step="0.01" placeholder="Ex: 14.02">

<div class="buttons">
<button class="calc" onclick="calcular()">Calcular</button>
<button class="clear" onclick="limpar()">Limpar</button>
</div>

<div class="result" id="resultado">
—
</div>

<button class="copy" onclick="copiar()">Copiar %</button>

<div class="footer">
Acréscimo fixo de R$100 no total
</div>

</div>

<script>

let ultimoResultado = null;

function calcular(){

    let qtd = parseFloat(document.getElementById("quantidade").value);
    let valor = parseFloat(document.getElementById("valor").value);

    if(!qtd || !valor){
        alert("Preencha os campos!");
        return;
    }

    let totalAtual = qtd * valor;
    let totalNovo = totalAtual + 100;

    let valorUnitNovo = totalNovo / qtd;

    let percentual = ((valorUnitNovo - valor) / valor) * 100;

    ultimoResultado = percentual.toFixed(4) + "%";

    document.getElementById("resultado").innerText = ultimoResultado;

}

function limpar(){

    document.getElementById("quantidade").value = "";
    document.getElementById("valor").value = "";
    document.getElementById("resultado").innerText = "—";
    ultimoResultado = null;

}

function copiar(){

    if(!ultimoResultado){
        alert("Calcule primeiro!");
        return;
    }

    navigator.clipboard.writeText(ultimoResultado);
    alert("Percentual copiado: " + ultimoResultado);

}

</script>

</body>
</html>
