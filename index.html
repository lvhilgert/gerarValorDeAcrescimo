<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora de Acréscimo</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f2f4f7;
    margin:0;
}

/* Barra estilo ERP */

.topbar{
    background:#3f7fb1;
    color:white;
    padding:12px 20px;
    font-size:16px;
    font-weight:bold;
}

/* Área central */

.container{
    display:flex;
    justify-content:center;
    margin-top:60px;
}

/* Card */

.card{
    background:white;
    padding:30px;
    border-radius:6px;
    width:380px;
    border:1px solid #d6d9dd;
}

/* título */

h1{
    font-size:20px;
    margin-top:0;
    margin-bottom:20px;
    color:#2d2d2d;
}

/* campos */

label{
    font-size:13px;
    color:#555;
    font-weight:bold;
}

input{
    width:100%;
    padding:9px;
    margin-top:6px;
    margin-bottom:18px;
    border-radius:4px;
    border:1px solid #cfd4da;
    font-size:15px;
}

input:focus{
    border-color:#3f7fb1;
    outline:none;
}

/* botões */

.buttons{
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:9px;
    border:none;
    border-radius:4px;
    font-weight:bold;
    cursor:pointer;
}

.calc{
    background:#3f7fb1;
    color:white;
}

.calc:hover{
    background:#346c98;
}

.clear{
    background:#e5e7eb;
}

.clear:hover{
    background:#d6d9dd;
}

.copy{
    margin-top:12px;
    width:100%;
    background:#4a5568;
    color:white;
}

.copy:hover{
    background:#2d3748;
}

/* resultado */

.result{
    margin-top:18px;
    padding:12px;
    background:#f7f9fb;
    border:1px solid #d6d9dd;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#3f7fb1;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#777;
}

</style>
</head>

<body>

<div class="topbar">
Calculadora de Acréscimo
</div>

<div class="container">

<div class="card">

<h1>Acréscimo de R$100 no total</h1>

<label>Quantidade vendida</label>
<input type="number" id="quantidade">

<label>Valor unitário (R$)</label>
<input type="number" id="valor" step="0.01">

<div class="buttons">
<button class="calc" onclick="calcular()">Calcular</button>
<button class="clear" onclick="limpar()">Limpar</button>
</div>

<div class="result" id="resultado">
—
</div>

<button class="copy" onclick="copiar()">Copiar %</button>

<div class="footer">
Ferramenta auxiliar
</div>

</div>

</div>

<script>

let ultimoResultado = null;

function calcular(){

    let qtd = parseFloat(document.getElementById("quantidade").value);
    let valor = parseFloat(document.getElementById("valor").value);

    if(!qtd || !valor){
        alert("Preencha os campos!");
        return;
    }

    let totalAtual = qtd * valor;
    let totalNovo = totalAtual + 100;

    let valorUnitNovo = totalNovo / qtd;

    let percentual = ((valorUnitNovo - valor) / valor) * 100;

    ultimoResultado = percentual.toFixed(4) + "%";

    document.getElementById("resultado").innerText = ultimoResultado;

}

function limpar(){

    document.getElementById("quantidade").value = "";
    document.getElementById("valor").value = "";
    document.getElementById("resultado").innerText = "—";
    ultimoResultado = null;

}

function copiar(){

    if(!ultimoResultado){
        alert("Calcule primeiro!");
        return;
    }

    navigator.clipboard.writeText(ultimoResultado);
    alert("Percentual copiado: " + ultimoResultado);

}

</script>

</body>
</html>
